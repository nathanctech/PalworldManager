name: Release

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on tags like v1.0.0, v2.3.1, etc.

permissions:
  contents: write  # required to create a GitHub Release and upload assets

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: win-x64
            asset_name: PalworldManager-windows-x64.exe
          - rid: linux-x64
            asset_name: PalworldManager-linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (${{ matrix.rid }})
        run: |
          dotnet publish PalworldManager.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=true \
            -p:DebugType=none \
            --output ./publish/${{ matrix.rid }}

      - name: Rename output binary
        shell: bash
        run: |
          # On Windows RID the binary has a .exe extension, Linux does not
          SRC=$(find ./publish/${{ matrix.rid }} -maxdepth 1 -type f \( -name "PalworldManager" -o -name "PalworldManager.exe" \) | head -n 1)
          mv "$SRC" ./publish/${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ./publish/${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ./artifacts/*